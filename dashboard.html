<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIG MBTI 대시보드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4ff;
      color: #1e3a5f;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      color: #fff;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(37,99,235,.25);
    }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
    .header span { font-size: 13px; opacity: 0.8; }
    .refresh-btn {
      background: rgba(255,255,255,0.2);
      border: none; color: #fff;
      padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.3); }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

    /* 주요 지표 카드 그리드 */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .metric-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 4px 16px rgba(37,99,235,.07);
      position: relative;
      overflow: hidden;
    }
    .metric-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      background: linear-gradient(180deg, #2563eb, #60a5fa);
      border-radius: 2px 0 0 2px;
    }
    .metric-icon { font-size: 28px; margin-bottom: 10px; }
    .metric-label {
      font-size: 12px; font-weight: 600;
      color: #6b7280; margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .metric-value {
      font-size: 32px; font-weight: 900;
      color: #1d4ed8; line-height: 1;
    }
    .metric-unit { font-size: 14px; font-weight: 600; color: #6b7280; margin-top: 4px; }

    /* 하단 2열 그리드 */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 700px) { .bottom-grid { grid-template-columns: 1fr; } }

    .section-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(37,99,235,.07);
    }
    .section-title {
      font-size: 15px; font-weight: 700;
      color: #1e3a5f; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    /* MBTI 바 차트 */
    .mbti-row {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 10px;
    }
    .mbti-label {
      width: 46px; font-size: 13px; font-weight: 700;
      color: #1d4ed8; text-align: right; flex-shrink: 0;
    }
    .mbti-bar-wrap {
      flex: 1; background: #eff6ff;
      border-radius: 6px; height: 22px; overflow: hidden;
    }
    .mbti-bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      border-radius: 6px;
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 6px;
    }
    .mbti-bar-num { font-size: 11px; font-weight: 700; color: #fff; }

    /* 일별 차트 */
    .daily-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 120px;
      padding-bottom: 24px;
      position: relative;
    }
    .daily-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .daily-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .daily-bar {
      width: 100%; border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      transition: height 0.6s ease;
      min-height: 3px;
    }
    .daily-date { font-size: 9px; color: #9ca3af; transform: rotate(-45deg); white-space: nowrap; }

    .loading { color: #9ca3af; font-size: 14px; text-align: center; padding: 32px; }
    .error-msg { color: #ef4444; font-size: 13px; text-align: center; padding: 16px; }

    .updated-at { font-size: 12px; color: #9ca3af; text-align: right; margin-top: 16px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 DIG MBTI 대시보드</h1>
    <span id="updatedAt">로딩 중...</span>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
</div>

<div class="container">

  <!-- 주요 지표 -->
  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-icon">👥</div>
      <div class="metric-label">전체 참여자</div>
      <div class="metric-value" id="mTotal">—</div>
      <div class="metric-unit">명</div>
    </div>
    <div class="metric-card">
      <div class="metric-icon">🚀</div>
      <div class="metric-label">퀴즈 시작</div>
      <div class="metric-value" id="mStarts">—</div>
      <div class="metric-unit">회</div>
    </div>
    <div class="metric-card">
      <div class="metric-icon">✅</div>
      <div class="metric-label">테스트 완료율</div>
      <div class="metric-value" id="mRate">—</div>
      <div class="metric-unit">%</div>
    </div>
    <div class="metric-card">
      <div class="metric-icon">⏱</div>
      <div class="metric-label">평균 세션시간</div>
      <div class="metric-value" id="mSession">—</div>
      <div class="metric-unit">초</div>
    </div>
    <div class="metric-card">
      <div class="metric-icon">📩</div>
      <div class="metric-label">뉴스레터 클릭</div>
      <div class="metric-value" id="mNewsletter">—</div>
      <div class="metric-unit">회</div>
    </div>
    <div class="metric-card">
      <div class="metric-icon">📸</div>
      <div class="metric-label">인스타 클릭</div>
      <div class="metric-value" id="mInsta">—</div>
      <div class="metric-unit">회</div>
    </div>
  </div>

  <!-- 하단 차트 -->
  <div class="bottom-grid">

    <!-- MBTI 분포 -->
    <div class="section-card">
      <div class="section-title">🧬 MBTI 유형별 분포</div>
      <div id="mbtiChart"><div class="loading">로딩 중...</div></div>
    </div>

    <!-- 일별 추이 -->
    <div class="section-card">
      <div class="section-title">📅 최근 30일 일별 완료 수</div>
      <div id="dailyChart"><div class="loading">로딩 중...</div></div>
    </div>

  </div>

  <div class="updated-at" id="updatedAtBottom"></div>
</div>

<script>
async function loadData() {
  document.getElementById('updatedAt').textContent = '로딩 중...';
  try {
    const res = await fetch('/api/dashboard');
    if (!res.ok) throw new Error('API 오류');
    const d = await res.json();

    // 주요 지표
    set('mTotal',      fmt(d.total_participants));
    set('mStarts',     fmt(d.quiz_starts));
    set('mRate',       d.completion_rate != null ? d.completion_rate : '—');
    set('mSession',    d.avg_session_sec != null ? d.avg_session_sec : '—');
    set('mNewsletter', fmt(d.newsletter_clicks));
    set('mInsta',      fmt(d.insta_clicks));

    // MBTI 바 차트
    renderMbti(d.by_mbti || []);

    // 일별 차트
    renderDaily(d.daily_last_30 || []);

    const now = new Date().toLocaleString('ko-KR');
    document.getElementById('updatedAt').textContent = `마지막 업데이트: ${now}`;
    document.getElementById('updatedAtBottom').textContent = `마지막 업데이트: ${now}`;

  } catch (e) {
    document.getElementById('updatedAt').textContent = '데이터 로드 실패';
    document.getElementById('mbtiChart').innerHTML = `<div class="error-msg">오류: ${e.message}</div>`;
    document.getElementById('dailyChart').innerHTML = `<div class="error-msg">오류: ${e.message}</div>`;
  }
}

function set(id, val) {
  document.getElementById(id).textContent = val;
}

function fmt(n) {
  return n != null ? Number(n).toLocaleString('ko-KR') : '0';
}

function renderMbti(data) {
  if (!data.length) { document.getElementById('mbtiChart').innerHTML = '<div class="loading">데이터 없음</div>'; return; }
  const max = Math.max(...data.map(r => r.count), 1);
  const html = data.map(r => {
    const pct = Math.round((r.count / max) * 100);
    return `
      <div class="mbti-row">
        <span class="mbti-label">${r.result_mbti}</span>
        <div class="mbti-bar-wrap">
          <div class="mbti-bar" style="width:${pct}%">
            <span class="mbti-bar-num">${r.count}</span>
          </div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('mbtiChart').innerHTML = html;
}

function renderDaily(data) {
  if (!data.length) { document.getElementById('dailyChart').innerHTML = '<div class="loading">데이터 없음</div>'; return; }
  const max = Math.max(...data.map(r => r.count), 1);
  const html = `<div class="daily-chart">` +
    data.map(r => {
      const pct = Math.round((r.count / max) * 90);
      const label = r.date.slice(5); // MM-DD
      return `
        <div class="daily-col">
          <div class="daily-bar-wrap">
            <div class="daily-bar" style="height:${pct}%" title="${r.date}: ${r.count}명"></div>
          </div>
          <span class="daily-date">${label}</span>
        </div>`;
    }).join('') + `</div>`;
  document.getElementById('dailyChart').innerHTML = html;
}

loadData();
</script>

</body>
</html>
